# Obliga construcción con Dockerfile.
# Migrate en el mismo contenedor que gunicorn: el paso «pre-deploy» de Railway suele fallar sin el mismo runtime/red que la app.
# Postgres: Variables del servicio web → referencia → DATABASE_URL.
[build]
builder = "DOCKERFILE"

[deploy]
startCommand = "/bin/sh -c \"python manage.py migrate --noinput && exec gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120\""
healthcheckPath = "/api/health/"
